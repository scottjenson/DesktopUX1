<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>history tree — v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<div class="canvas-bg"></div>

<header>
  <span class="title" id="title">Discovering User Intent</span>
  <div class="view-switcher">
    <button class="view-btn" data-view="history">Simple History</button>
    <button class="view-btn" data-view="telemetry">Telemetry</button>
    <button class="view-btn" data-view="tree">Tree View</button>
    <button class="view-btn" data-view="anchor">Anchor View</button>
  </div>
</header>

<div id="stage">
  <svg id="svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrowhead-accent" markerWidth="14" markerHeight="10"
              refX="14" refY="5" orient="auto" markerUnits="userSpaceOnUse">
        <polygon points="0 0, 14 5, 0 10" fill="#d4b27a" />
      </marker>
      <marker id="arrowhead-carrier" markerWidth="14" markerHeight="10"
              refX="14" refY="5" orient="auto" markerUnits="userSpaceOnUse">
        <polygon points="0 0, 14 5, 0 10" fill="#6fa8c4" />
      </marker>
    </defs>
    <g id="viewport">
      <g id="bg-layer"></g>
      <g id="edges"></g>
      <g id="satellite-overlay"></g>
      <g id="nodes"></g>
      <g id="hover-targets"></g>
      <g id="telemetry-layer" opacity="0"></g>
    </g>
  </svg>
</div>

<footer>
  <span>drag to pan</span>
  <span>scroll to zoom</span>
  <span><kbd>1</kbd> Simple History</span>
  <span><kbd>2</kbd> Telemetry</span>
  <span><kbd>3</kbd> Tree View</span>
  <span><kbd>4</kbd> Anchor View</span>
  <span class="right">zoom <span id="zoom-readout">1.00×</span></span>
</footer>

<script src="js/data.js"></script>
<script src="js/url-utils.js"></script>
<script src="js/tree-layout.js"></script>
<script src="js/anchor-data.js"></script>
<script src="js/node-registry.js"></script>
<script src="js/history-layout.js"></script>
<script src="js/tree-view.js"></script>
<script src="js/anchor-view.js"></script>
<script src="js/transitions.js"></script>
<script src="js/pan-zoom.js"></script>
<script src="js/main.js"></script>
</body>
</html>
